<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Actor Empire 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(20, 20, 23, 0.6);
            --bottom-nav-clearance: 5.75rem;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #09090b; /* Zinc 950 */
        }
        /* Custom Utilities */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .pb-safe-lg {
            padding-bottom: calc(env(safe-area-inset-bottom) + 1rem);
        }
        .pb-safe-xl {
            padding-bottom: calc(env(safe-area-inset-bottom) + 7rem);
        }
        .pb-nav-safe {
            padding-bottom: calc(env(safe-area-inset-bottom) + var(--bottom-nav-clearance));
        }
        .pb-nav-safe-lg {
            padding-bottom: calc(env(safe-area-inset-bottom) + var(--bottom-nav-clearance) + 2rem);
        }
        .bottom-nav-safe {
            bottom: calc(env(safe-area-inset-bottom) + var(--bottom-nav-clearance));
        }
        .pt-safe-top {
            padding-top: max(35px, env(safe-area-inset-top));
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }
        .pattern-diagonal-lines {
            background-image: repeating-linear-gradient(
                45deg,
                rgba(0, 0, 0, 0.2),
                rgba(0, 0, 0, 0.2) 5px,
                rgba(0, 0, 0, 0.3) 5px,
                rgba(0, 0, 0, 0.3) 10px
            );
        }
        .custom-scrollbar {
            -webkit-overflow-scrolling: touch; /* Momentum scrolling for iOS */
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .custom-scrollbar::-webkit-scrollbar {
            display: none; /* Hide scrollbar for Chrome, Safari and Opera */
        }
    </style>
    
    <!-- GOOGLE ADSENSE H5 GAMES INTEGRATION -->
    <!-- Replace 'data-ad-client' with your actual Publisher ID (e.g. ca-pub-123456789) -->
    <!-- 'data-ad-break-test="on"' forces ads to show in development. Remove for production. -->
    <script async
        data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" 
        data-ad-frequency-hint="30s"
        data-ad-break-test="on" 
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js">
    </script>
    
    <script>
      window.adsbygoogle = window.adsbygoogle || [];
      window.adConfig = function(o) { window.adsbygoogle.push(o); }
    </script>
